    <title>Lexical Scopping</title>
</head>
<body>
    <h1>Lexical scope</h1>
</body>
<script>
    function outer(){
        let username = "Hiren"
        function inner(){
            var age = 22;
            console.log("Inner", username);

            function inner1(){
            console.log("Inner1", age);
        }

        inner1();
        }               
        inner();
    }
    outer();

</script>
